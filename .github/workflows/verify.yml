name: Verify computational results

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run exhaustive verification
        run: python3 src/verify.py
      - name: Confirm generated results are unchanged
        run: >-
          git diff --exit-code --
          results/verification.csv
          results/verification_summary.json
